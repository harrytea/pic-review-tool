<style type="text/css">
.img-grid {
	display: grid;
	grid-template-columns: repeat(var(--cols, 6), 1fr);
	gap: 8px;
}
.img-card {
	border: 1px solid #ccc;
	padding: 4px;
	text-align: center;
	cursor: pointer;
	box-sizing: border-box;
	overflow: hidden;
}
.img-card img {
	max-width: 100%;
	height: auto;
	display: block;
	margin: 0 auto;
}
.img-grid.fixed-h .img-card img {
	height: var(--img-h, 140px);
	width: auto;
	max-width: 100%;
	object-fit: contain;
}
.img-card .img-id {
	font-size: 12px;
	color: #666;
}
.img-card .img-val {
	font-size: 14px;
	font-weight: bold;
}
.img-card.marked {
	border: 3px solid #ff00ff;
	background-color: #ffe0ff;
}
</style>

<script language="javascript">
//能否弄一个公用的方法，贴入url即可产生一个表格，
//使得每个图片点击一下，即可标记是否是恶意图片
//最后表格可以复制出来，以便对比
//js不方便处理的话，也可以使用cgi

//从xml文档中得到指定名字结点(只得到文档中第一个该名称结点)
function getUniqueNode(xmlRoot,nodeName){
	if ( xmlRoot == null ) {
		return null;
	}
	var temp = xmlRoot.getElementsByTagName(nodeName);
	if (temp.length == 0)
	{
		//window.alert("in getUniqueNode("+nodeName+").length == 0");
		return null;
	}
	else{
		return temp[0];
	}
}

/***************
 * @FuncName:	ClearTabData
 * @Desc:		清除指定的tab中的所有行，包括表头
 * @Param:		objTab: 指定的要清除所有元素的table obj
 * @Param:		isSkipTH	,是否要清除表头
 * @Return:		成功返回true，否则返回false
 * @Author:		kennyli
 * @Date:		20080331
 */
function ClearTabData(objTab,isSkipTH)
{
	//make sure that objTab is a table
	if ( objTab == null )
	{
		window.alert("objTab is null");
		return false;
	}
	if ( objTab.nodeName != "TABLE" )
	{
		window.alert("objTab="+objTab+":"+objTab.nodeName+" is not a TABLE!");
		return false;
	}
	if ( !objTab.hasChildNodes() )
	{
		window.alert("objTab has no child");
		return false;
	}

	//get tbody of the table
	var curNode;
	for ( curNode = objTab.firstChild; curNode != null; curNode=curNode.nextSibling )
	{
		//alert("in table"+objTab.id+"'s node: "+curNode.nodeName);
		if (curNode.nodeName == "TBODY")
			break;
	}
	if (curNode == null)
	{	//cannot find tbody
		window.alert("obj has no child named TBODY,try to add a TBODY");
		curNode = document.createElement("TBODY");
		objTab.appendChild(curNode);
	}

	//remove all rows
	var count=curNode.childNodes.length;
	for (var i=count-1; i>=0; i--)
	{
		var subNode ;
		if ( curNode.childNodes[i].nodeName=="TR" && 
			getUniqueNode(curNode.childNodes[i], "TH") != null  ) {
			if ( !isSkipTH  ) {
				//如果设置需要清理表头,则清理表头
				curNode.removeChild(curNode.childNodes[i]);
			}
		}
		else
		{
			curNode.removeChild(curNode.childNodes[i]);
		}
	}
	/* 这种方式无法过滤条件,因为如果某个结点想跳过,则会产生死循环
	while( curNode.childNodes.length > 0 ) {
		if ( curNode.childNodes[0].nodeName=="TH") {
			if ( !isSkipTH  ) {
				//如果设置需要清理表头,则清理表头
				curNode.removeChild(curNode.childNodes[0]);
			}
		}
		else
		{
			curNode.removeChild(curNode.childNodes[0]);
		}
	}
	*/

	return true;
}

//产生一个text的td元素,id指定为idname
function CreateCellWithText(text,idname) {
	var cell = document.createElement("td");
	cell.id=idname;
	cell.appendChild(document.createTextNode(text));
	return cell;
}

//产生一个text的th元素
function CreateHeadCellWithText(text,idname) {
	var cell = document.createElement("th");
	cell.id=idname;
	cell.appendChild(document.createTextNode(text));
	return cell;
}

//产生一个带颜色的text类型的td元素
function CreateCellWithTextColor(text,color,idname){
	var cell = document.createElement("td");
	var textelement  = document.createTextNode(text);
	cell.id=idname;
	cell.appendChild(textelement);
	cell.style.color = color;
	return cell;
}

//产生一个图片的td元素
function CreateCellWithImage(imagePath,idname,imgid){
	var cell = document.createElement("td");
	//var div = document.createElement("div");
	var image = document.createElement("img");
	image.id=imgid;
	image.src=imagePath;
	//div.appendChild(image);
	cell.id=idname;
	//cell.appendChild(div);
	cell.appendChild(image);
	return cell;
}

function bodyclickHandler(evt)
{
    var obj = evt.srcElement || evt.target;
	// 找到最近的 .img-card
	var card = obj.closest ? obj.closest('.img-card') : null;
	if (!card) return;
	var idx = card.getAttribute('data-idx');
	var valSpan = document.getElementById("valTD"+idx);
	if(valSpan.innerHTML==1){
		valSpan.innerHTML = 0;
		card.classList.remove('marked');
	} else {
		valSpan.innerHTML = 1;
		card.classList.add('marked');
	}
	getMarkedImgUrl();
}

</script>
</HEAD>

<BODY onclick=bodyclickHandler(event)>

<div id="divURL" style="display:block">
	<label>请输入图片URL：</label>
	<input type=button value="显示图片" onclick="loadImg()"/>
	<br/>
	<textarea cols="40" rows="15" style="width:850px;height:400px;" name="idTxtAreaUrl" id="idTxtAreaUrl"></textarea>
</div>

<div id="divImg" style="display:none">

	<div style="margin-bottom:8px;">
		<label>每行图片数量：</label>
		<input type=button value="-" onclick="changeCols(-1)"/>
		<input type=number id="colsInput" value="6" min="1" max="20" style="width:60px;text-align:center;" onchange="setColsFromInput()"/>
		<input type=button value="+" onclick="changeCols(1)"/>
		&nbsp;快捷：
		<input type=button value="2" onclick="setCols(2)"/>
		<input type=button value="4" onclick="setCols(4)"/>
		<input type=button value="6" onclick="setCols(6)"/>
		<input type=button value="8" onclick="setCols(8)"/>
		<input type=button value="10" onclick="setCols(10)"/>
	</div>
	<div style="margin-bottom:8px;">
		<label>图片高度：</label>
		<input type=button value="自适应高度" onclick="setAutoHeight()"/>
		<input type=button value="固定高度" onclick="setFixedHeight()"/>
		&nbsp;
		<input type=button value="-" onclick="changeHeight(-20)"/>
		<input type=number id="heightInput" value="140" min="40" max="800" step="10" style="width:70px;text-align:center;" onchange="setHeightFromInput()"/>
		<label>px</label>
		<input type=button value="+" onclick="changeHeight(20)"/>
	</div>
	<div id="imgGrid" class="img-grid"></div>
	<div style="margin-top:10px;">
		<div>
			<input type=button value="获取被标记图片的URL" onclick="getMarkedImgUrl()"/>
			<input type=button value="返回" onclick="location.reload()"/>
		</div>
		<div>
			<label >被标记图片的URL列表：&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label><span class=""></span><label id="labelMarkedImgCnt"></label>
		</div>
		<textarea cols="40" rows="5" style="width:850px;height:200px;" disabled="disabled" name="idTxtAreaMarkedUrl" id="idTxtAreaMarkedUrl"></textarea>
	</div>
</div>

</BODY>


<script language="javascript">

	var totalImgCount = 0;

	function setCols(n) {
		n = parseInt(n);
		if (isNaN(n) || n < 1) n = 1;
		if (n > 20) n = 20;
		var grid = document.getElementById("imgGrid");
		grid.style.setProperty('--cols', n);
		document.getElementById("colsInput").value = n;
	}

	function changeCols(delta) {
		var input = document.getElementById("colsInput");
		var n = parseInt(input.value) || 6;
		setCols(n + delta);
	}

	function setColsFromInput() {
		var input = document.getElementById("colsInput");
		setCols(input.value);
	}

	function setAutoHeight() {
		var grid = document.getElementById("imgGrid");
		grid.classList.remove('fixed-h');
	}

	function setFixedHeight() {
		var grid = document.getElementById("imgGrid");
		grid.classList.add('fixed-h');
		setHeight(document.getElementById("heightInput").value);
	}

	function setHeight(h) {
		h = parseInt(h);
		if (isNaN(h) || h < 40) h = 40;
		if (h > 800) h = 800;
		var grid = document.getElementById("imgGrid");
		grid.style.setProperty('--img-h', h + 'px');
		document.getElementById("heightInput").value = h;
		grid.classList.add('fixed-h');
	}

	function changeHeight(delta) {
		var input = document.getElementById("heightInput");
		var h = parseInt(input.value) || 140;
		setHeight(h + delta);
	}

	function setHeightFromInput() {
		var input = document.getElementById("heightInput");
		setHeight(input.value);
	}

	function getMarkedImgUrl() {
		var dstTxtArea = document.getElementById("idTxtAreaMarkedUrl");
		dstTxtArea.innerHTML="";
		var cnt=0;
		for (var i=0; i<totalImgCount;i++) {
			if(1==document.getElementById("valTD"+i).innerHTML){
				dstTxtArea.innerHTML+=document.getElementById("myimg"+i).src;
				dstTxtArea.innerHTML+="\n";
				cnt++;
			}
		}
		if(0==cnt) {
			document.getElementById("labelMarkedImgCnt").innerHTML="<b>没有标记任何图片！</b>";
			document.getElementById("labelMarkedImgCnt").style.color="red";
		}
		else{
			document.getElementById("labelMarkedImgCnt").innerHTML="<b>共标记了 "+cnt+" 张图片！</b>";
			document.getElementById("labelMarkedImgCnt").style.color="blue";
		}
	}

	function loadImg(){
		
		var objDivUrl = document.getElementById("divURL");
		var objDivImg = document.getElementById("divImg");
		objDivUrl.style.display="none";
		objDivImg.style.display="block";

		var ObjURLTxt = document.getElementById("idTxtAreaUrl");
		var content   = ObjURLTxt.value.split('\n');
		var arrImgUrl = [];
		for (var j=0; j<content.length; j++) {
			var line = content[j].trim();
			if (line.length==0) continue;
			if (!/^https?:\/\//i.test(line)) continue;
			arrImgUrl.push(line);
		}

		var grid = document.getElementById("imgGrid");
		grid.innerHTML = "";
		setCols(document.getElementById("colsInput").value);
		totalImgCount = arrImgUrl.length;
		
		for ( var i=0; i<arrImgUrl.length; i++ )
		{
			var card = document.createElement("div");
			card.className = "img-card";
			card.setAttribute("data-idx", i);
			card.innerHTML = '<div class="img-id">' + (i+1) + '</div>' +
				'<img id="myimg'+i+'" src="'+arrImgUrl[i]+'">' +
				'<span class="img-val" id="valTD'+i+'">0</span>';
			grid.appendChild(card);
		}
	}

	//loadImg();

</script>

</HTML>
