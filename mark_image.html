<style type="text/css">
.img-grid {
	display: grid;
	grid-template-columns: repeat(var(--cols, 6), 1fr);
	gap: 8px;
}
.img-card {
	border: 1px solid #ccc;
	padding: 4px;
	text-align: center;
	cursor: pointer;
	box-sizing: border-box;
	overflow: hidden;
}
.img-card img {
	max-width: 100%;
	height: auto;
	display: block;
	margin: 0 auto;
}
.img-grid.fixed-h .img-card img {
	height: var(--img-h, 140px);
	width: auto;
	max-width: 100%;
	object-fit: contain;
}
.img-card .img-id {
	font-size: 12px;
	color: #666;
}
.img-card .img-val {
	font-size: 14px;
	font-weight: bold;
}
.img-card.marked {
	border: 3px solid #ff00ff;
	background-color: #ffe0ff;
}
.img-table {
	border-collapse: collapse;
	width: 100%;
	font-size: 13px;
}
.img-table th, .img-table td {
	border: 1px solid #ccc;
	padding: 6px 8px;
	vertical-align: middle;
	word-break: break-all;
}
.img-table th {
	background: #f5f5f5;
	position: sticky;
	top: 0;
	z-index: 1;
}
.img-table tbody tr {
	cursor: pointer;
}
.img-table tbody tr.marked {
	background-color: #ffe0ff;
	outline: 2px solid #ff00ff;
}
.img-table td.url-cell {
	text-align: center;
}
.img-table td.url-cell img {
	max-width: 260px;
	height: auto;
	display: block;
	margin: 0 auto;
}
.img-table.fixed-h td.url-cell img {
	height: var(--img-h, 140px);
	width: auto;
	max-width: 100%;
	object-fit: contain;
}
.img-table td.mark-cell {
	text-align: center;
	font-weight: bold;
	color: #ff00ff;
	width: 40px;
}
</style>

<script language="javascript">
//能否弄一个公用的方法，贴入url即可产生一个表格，
//使得每个图片点击一下，即可标记是否是恶意图片
//最后表格可以复制出来，以便对比
//js不方便处理的话，也可以使用cgi

//从xml文档中得到指定名字结点(只得到文档中第一个该名称结点)
function getUniqueNode(xmlRoot,nodeName){
	if ( xmlRoot == null ) {
		return null;
	}
	var temp = xmlRoot.getElementsByTagName(nodeName);
	if (temp.length == 0)
	{
		//window.alert("in getUniqueNode("+nodeName+").length == 0");
		return null;
	}
	else{
		return temp[0];
	}
}

/***************
 * @FuncName:	ClearTabData
 * @Desc:		清除指定的tab中的所有行，包括表头
 * @Param:		objTab: 指定的要清除所有元素的table obj
 * @Param:		isSkipTH	,是否要清除表头
 * @Return:		成功返回true，否则返回false
 * @Author:		kennyli
 * @Date:		20080331
 */
function ClearTabData(objTab,isSkipTH)
{
	//make sure that objTab is a table
	if ( objTab == null )
	{
		window.alert("objTab is null");
		return false;
	}
	if ( objTab.nodeName != "TABLE" )
	{
		window.alert("objTab="+objTab+":"+objTab.nodeName+" is not a TABLE!");
		return false;
	}
	if ( !objTab.hasChildNodes() )
	{
		window.alert("objTab has no child");
		return false;
	}

	//get tbody of the table
	var curNode;
	for ( curNode = objTab.firstChild; curNode != null; curNode=curNode.nextSibling )
	{
		//alert("in table"+objTab.id+"'s node: "+curNode.nodeName);
		if (curNode.nodeName == "TBODY")
			break;
	}
	if (curNode == null)
	{	//cannot find tbody
		window.alert("obj has no child named TBODY,try to add a TBODY");
		curNode = document.createElement("TBODY");
		objTab.appendChild(curNode);
	}

	//remove all rows
	var count=curNode.childNodes.length;
	for (var i=count-1; i>=0; i--)
	{
		var subNode ;
		if ( curNode.childNodes[i].nodeName=="TR" && 
			getUniqueNode(curNode.childNodes[i], "TH") != null  ) {
			if ( !isSkipTH  ) {
				//如果设置需要清理表头,则清理表头
				curNode.removeChild(curNode.childNodes[i]);
			}
		}
		else
		{
			curNode.removeChild(curNode.childNodes[i]);
		}
	}
	/* 这种方式无法过滤条件,因为如果某个结点想跳过,则会产生死循环
	while( curNode.childNodes.length > 0 ) {
		if ( curNode.childNodes[0].nodeName=="TH") {
			if ( !isSkipTH  ) {
				//如果设置需要清理表头,则清理表头
				curNode.removeChild(curNode.childNodes[0]);
			}
		}
		else
		{
			curNode.removeChild(curNode.childNodes[0]);
		}
	}
	*/

	return true;
}

//产生一个text的td元素,id指定为idname
function CreateCellWithText(text,idname) {
	var cell = document.createElement("td");
	cell.id=idname;
	cell.appendChild(document.createTextNode(text));
	return cell;
}

//产生一个text的th元素
function CreateHeadCellWithText(text,idname) {
	var cell = document.createElement("th");
	cell.id=idname;
	cell.appendChild(document.createTextNode(text));
	return cell;
}

//产生一个带颜色的text类型的td元素
function CreateCellWithTextColor(text,color,idname){
	var cell = document.createElement("td");
	var textelement  = document.createTextNode(text);
	cell.id=idname;
	cell.appendChild(textelement);
	cell.style.color = color;
	return cell;
}

//产生一个图片的td元素
function CreateCellWithImage(imagePath,idname,imgid){
	var cell = document.createElement("td");
	//var div = document.createElement("div");
	var image = document.createElement("img");
	image.id=imgid;
	image.src=imagePath;
	//div.appendChild(image);
	cell.id=idname;
	//cell.appendChild(div);
	cell.appendChild(image);
	return cell;
}

function bodyclickHandler(evt)
{
    var obj = evt.srcElement || evt.target;
	// 找到最近的 .img-card 或表格中的行
	var card = obj.closest ? obj.closest('.img-card') : null;
	var row  = obj.closest ? obj.closest('tr.img-row') : null;
	var container = card || row;
	if (!container) return;
	var idx = container.getAttribute('data-idx');
	var valSpan = document.getElementById("valTD"+idx);
	if(valSpan.innerHTML==1){
		valSpan.innerHTML = 0;
		container.classList.remove('marked');
	} else {
		valSpan.innerHTML = 1;
		container.classList.add('marked');
	}
	getMarkedImgUrl();
}

</script>

<BODY onclick=bodyclickHandler(event)>

<div id="divURL" style="display:block">
	<div style="margin-bottom:8px;">
		<label><b>输入模式：</b></label>
		<label><input type="radio" name="inputMode" value="url" checked onclick="switchInputMode('url')"/> URL 模式（每行一个图片链接）</label>

		<label><input type="radio" name="inputMode" value="table" onclick="switchInputMode('table')"/> 表格模式（自动识别 URL 列，可含表头也可不含）</label>
	</div>
	<div id="urlHint" style="color:#666;font-size:12px;margin-bottom:4px;">

		直接从 Excel/表格复制粘贴，列之间使用 Tab（\t）分隔。工具会自动识别包含图片 URL 的列并渲染为图片；首行若不是 URL 会被当作表头，否则自动使用"列N"作为列名。

	<input type=button value="显示图片" onclick="loadImg()"/>

	<textarea cols="40" rows="15" style="width:850px;height:400px;" name="idTxtAreaUrl" id="idTxtAreaUrl"></textarea>

<div id="divImg" style="display:none">

	<div style="margin-bottom:8px;">
		<label><b>展示视图：</b></label>
		<input type=button id="btnViewGrid" value="网格视图" onclick="setView('grid')"/>
		<input type=button id="btnViewTable" value="表格视图" onclick="setView('table')"/>
	</div>
	<div id="gridControls" style="margin-bottom:8px;">
		<label>每行图片数量：</label>
		<input type=button value="-" onclick="changeCols(-1)"/>
		<input type=number id="colsInput" value="6" min="1" max="20" style="width:60px;text-align:center;" onchange="setColsFromInput()"/>
		<input type=button value="+" onclick="changeCols(1)"/>
		&nbsp;快捷：
		<input type=button value="2" onclick="setCols(2)"/>
		<input type=button value="4" onclick="setCols(4)"/>
		<input type=button value="6" onclick="setCols(6)"/>
		<input type=button value="8" onclick="setCols(8)"/>
		<input type=button value="10" onclick="setCols(10)"/>
	</div>
	<div style="margin-bottom:8px;">
		<label>图片高度：</label>
		<input type=button value="自适应高度" onclick="setAutoHeight()"/>
		<input type=button value="固定高度" onclick="setFixedHeight()"/>
		&nbsp;
		<input type=button value="-" onclick="changeHeight(-20)"/>
		<input type=number id="heightInput" value="140" min="40" max="800" step="10" style="width:70px;text-align:center;" onchange="setHeightFromInput()"/>
		<label>px</label>
		<input type=button value="+" onclick="changeHeight(20)"/>
	</div>
	<div id="imgGrid" class="img-grid"></div>
	<div id="imgTableWrap" style="display:none;overflow:auto;max-height:80vh;">
		<table id="imgTable" class="img-table"></table>
	</div>

		<div>
			<input type=button value="获取被标记图片的URL" onclick="getMarkedImgUrl()"/>
			<input type=button value="返回" onclick="location.reload()"/>
		</div>
		<div>
			<label >被标记图片的URL列表：&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label><span class=""></span><label id="labelMarkedImgCnt"></label>
		</div>
		<textarea cols="40" rows="5" style="width:850px;height:200px;" disabled="disabled" name="idTxtAreaMarkedUrl" id="idTxtAreaMarkedUrl"></textarea>

<script language="javascript">

	var totalImgCount = 0;
	var currentMode = 'url';      // 'url' | 'table'
	var currentView = 'grid';     // 'grid' | 'table'

	function switchInputMode(mode) {
		currentMode = mode;
		document.getElementById("urlHint").style.display   = (mode==='url')   ? 'block' : 'none';
		document.getElementById("tableHint").style.display = (mode==='table') ? 'block' : 'none';
		document.getElementById("lblInput").innerHTML =
			(mode==='url') ? '请输入图片URL：' : '请粘贴带表头的表格数据（Tab 分隔）：';
	}

	function setView(view) {
		currentView = view;
		var gridWrap  = document.getElementById("imgGrid");
		var tableWrap = document.getElementById("imgTableWrap");
		var gridCtrl  = document.getElementById("gridControls");
		if (view === 'table') {
			gridWrap.style.display  = 'none';
			tableWrap.style.display = 'block';
			gridCtrl.style.display  = 'none';
		} else {
			gridWrap.style.display  = 'grid';
			tableWrap.style.display = 'none';
			gridCtrl.style.display  = 'block';
		}
	}

	function setCols(n) {
		n = parseInt(n);
		if (isNaN(n) || n < 1) n = 1;
		if (n > 20) n = 20;
		var grid = document.getElementById("imgGrid");
		grid.style.setProperty('--cols', n);
		document.getElementById("colsInput").value = n;
	}

	function changeCols(delta) {
		var input = document.getElementById("colsInput");
		var n = parseInt(input.value) || 6;
		setCols(n + delta);
	}

	function setColsFromInput() {
		var input = document.getElementById("colsInput");
		setCols(input.value);
	}

	function setAutoHeight() {
		document.getElementById("imgGrid").classList.remove('fixed-h');
		document.getElementById("imgTable").classList.remove('fixed-h');
	}

	function setFixedHeight() {
		document.getElementById("imgGrid").classList.add('fixed-h');
		document.getElementById("imgTable").classList.add('fixed-h');
		setHeight(document.getElementById("heightInput").value);
	}

	function setHeight(h) {
		h = parseInt(h);
		if (isNaN(h) || h < 40) h = 40;
		if (h > 800) h = 800;
		var grid  = document.getElementById("imgGrid");
		var table = document.getElementById("imgTable");
		grid.style.setProperty('--img-h', h + 'px');
		table.style.setProperty('--img-h', h + 'px');
		document.getElementById("heightInput").value = h;
		grid.classList.add('fixed-h');
		table.classList.add('fixed-h');
	}

	function changeHeight(delta) {
		var input = document.getElementById("heightInput");
		var h = parseInt(input.value) || 140;
		setHeight(h + delta);
	}

	function setHeightFromInput() {
		var input = document.getElementById("heightInput");
		setHeight(input.value);
	}

	function getMarkedImgUrl() {
		var dstTxtArea = document.getElementById("idTxtAreaMarkedUrl");
		dstTxtArea.innerHTML="";
		var cnt=0;
		for (var i=0; i<totalImgCount;i++) {
			if(1==document.getElementById("valTD"+i).innerHTML){
				dstTxtArea.innerHTML+=document.getElementById("myimg"+i).src;
				dstTxtArea.innerHTML+="\n";
				cnt++;
			}
		}
		if(0==cnt) {
			document.getElementById("labelMarkedImgCnt").innerHTML="<b>没有标记任何图片！</b>";
			document.getElementById("labelMarkedImgCnt").style.color="red";
		}
		else{
			document.getElementById("labelMarkedImgCnt").innerHTML="<b>共标记了 "+cnt+" 张图片！</b>";
			document.getElementById("labelMarkedImgCnt").style.color="blue";
		}
	}

	function escapeHtml(s) {
		return (s == null ? '' : String(s))
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;');
	}

	function loadImg(){

		var objDivUrl = document.getElementById("divURL");
		var objDivImg = document.getElementById("divImg");
		objDivUrl.style.display="none";
		objDivImg.style.display="block";

		var ObjURLTxt = document.getElementById("idTxtAreaUrl");
		var raw = ObjURLTxt.value;
		var lines = raw.split('\n');

		var grid  = document.getElementById("imgGrid");
		var table = document.getElementById("imgTable");
		grid.innerHTML = "";
		table.innerHTML = "";

		if (currentMode === 'table') {
			// 收集所有非空行
			var allRows = [];
			for (var k=0; k<lines.length; k++) {
				var ln = lines[k].replace(/\r$/, '');
				if (ln.trim().length === 0) continue;
				allRows.push(ln.split('\t'));
			}
			if (allRows.length === 0) {
				alert('请粘贴表格数据');
				return;
			}

			// 判断首行是否为表头：首行任一单元格不是 URL，且下方存在 URL 列 -> 视为表头
			function isUrl(s){ return /^https?:\/\//i.test((s||'').trim()); }

			var maxCols = 0;
			for (var i=0; i<allRows.length; i++) {
				if (allRows[i].length > maxCols) maxCols = allRows[i].length;
			}

			// 自动检测 URL 列：统计每一列出现 URL 的次数，取最多的一列
			var urlColIdx = -1, bestCount = 0;
			for (var c=0; c<maxCols; c++) {
				var cnt = 0;
				for (var r=0; r<allRows.length; r++) {
					if (isUrl(allRows[r][c])) cnt++;
				}
				if (cnt > bestCount) { bestCount = cnt; urlColIdx = c; }
			}
			if (urlColIdx < 0 || bestCount === 0) {
				alert('未在数据中自动识别出图片 URL 列');
				return;
			}

			// 判断首行是否为表头：首行该列不是 URL 即视为表头
			var headers, dataRows;
			var firstRow = allRows[0];
			var firstRowIsHeader = !isUrl(firstRow[urlColIdx]);
			if (firstRowIsHeader) {
				headers  = firstRow;
				dataRows = allRows.slice(1);
			} else {
				headers  = [];
				for (var h=0; h<maxCols; h++) headers.push('列'+(h+1));
				dataRows = allRows;
			}
			// 补齐 headers 长度
			while (headers.length < maxCols) headers.push('列'+(headers.length+1));

			// 构建表头
			var thead = document.createElement('thead');
			var trh = document.createElement('tr');
			trh.innerHTML = '<th>#</th><th>标记</th>' +
				headers.map(function(h,idx){
					var name = escapeHtml((h||'').trim() || ('列'+(idx+1)));
					if (idx === urlColIdx) name += '（图片）';
					return '<th>'+name+'</th>';
				}).join('');
			thead.appendChild(trh);
			table.appendChild(thead);

			var tbody = document.createElement('tbody');
			totalImgCount = dataRows.length;
			for (var r=0; r<dataRows.length; r++) {
				var cols = dataRows[r];
				var tr = document.createElement('tr');
				tr.className = 'img-row';
				tr.setAttribute('data-idx', r);
				var html = '<td>' + (r+1) + '</td>' +
					'<td class="mark-cell"><span class="img-val" id="valTD'+r+'">0</span></td>';
				for (var c=0; c<headers.length; c++) {
					var cell = cols[c] != null ? cols[c] : '';
					if (c === urlColIdx) {
						var u = (cell||'').trim();
						if (isUrl(u)) {
							html += '<td class="url-cell"><img id="myimg'+r+'" src="'+escapeHtml(u)+'"/><div style="font-size:11px;color:#888;word-break:break-all;">'+escapeHtml(u)+'</div></td>';
						} else {
							html += '<td class="url-cell"><span id="myimgHolder'+r+'" data-src="" style="color:#999;">(无URL)</span></td>';
						}
					} else {
						html += '<td>'+escapeHtml(cell)+'</td>';
					}
				}
				tr.innerHTML = html;
				tbody.appendChild(tr);
			}
			table.appendChild(tbody);

			setView('table');
		} else {
			// URL 模式（保持原逻辑）
			var arrImgUrl = [];
			for (var j=0; j<lines.length; j++) {
				var line = lines[j].trim();
				if (line.length==0) continue;
				if (!/^https?:\/\//i.test(line)) continue;
				arrImgUrl.push(line);
			}
			setCols(document.getElementById("colsInput").value);
			totalImgCount = arrImgUrl.length;

			for ( var i=0; i<arrImgUrl.length; i++ )
			{
				var card = document.createElement("div");
				card.className = "img-card";
				card.setAttribute("data-idx", i);
				card.innerHTML = '<div class="img-id">' + (i+1) + '</div>' +
					'<img id="myimg'+i+'" src="'+arrImgUrl[i]+'">' +
					'<span class="img-val" id="valTD'+i+'">0</span>';
				grid.appendChild(card);
			}

			setView('grid');
		}
	}

	//loadImg();

</script>

</HTML>
